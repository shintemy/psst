<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <title>Psst – AI Usage Monitor</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --accent:    #7c3aed;
      --accent-lt: #a78bfa;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    header {
      max-width: 720px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-lt);
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2px;
    }

    #last-updated {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .meta-row strong { color: var(--text); }

    .provider-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .provider-name {
      font-size: 1rem;
      font-weight: 600;
      text-transform: capitalize;
      color: var(--accent-lt);
      margin-bottom: 1rem;
    }

    .window-card {
      margin-bottom: 1rem;
    }

    .window-card:last-child { margin-bottom: 0; }

    .window-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .window-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      text-transform: capitalize;
    }

    .window-detail {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .bar-track {
      position: relative;
      background: var(--border);
      border-radius: 99px;
      height: 12px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .bar-label {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.68rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 0 4px rgba(0,0,0,0.6);
    }

    .window-resets {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .empty-msg, .error-msg {
      font-size: 0.9rem;
      color: var(--muted);
      padding: 2rem 0;
      text-align: center;
    }

    .error-msg { color: var(--red); }

    .provider-error {
      font-size: 0.82rem;
      color: var(--amber);
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
    }

    /* ── Settings panel ── */

    #settings-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #settings-btn:hover:not(:disabled) { border-color: var(--accent); }

    #settings-panel {
      margin-top: 1.5rem;
    }

    .settings-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    .settings-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent-lt);
      margin-bottom: 0.5rem;
    }

    .settings-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .settings-row:last-of-type { border-bottom: none; }

    .settings-label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      text-transform: capitalize;
      min-width: 80px;
    }

    .settings-fields {
      display: flex;
      gap: 1rem;
      flex: 1;
      flex-wrap: wrap;
    }

    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .field-label {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .settings-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.4rem 0.6rem;
      font-size: 0.85rem;
      width: 140px;
    }

    .settings-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .settings-add-section {
      padding-top: 0.75rem;
    }

    .settings-add-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .btn-add {
      background: var(--border);
      color: var(--text);
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      white-space: nowrap;
    }

    .btn-add:hover { background: var(--accent); }

    .settings-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
      padding: 0.5rem 1.5rem;
    }

    .btn-save:hover:not(:disabled) { opacity: 0.88; }

    .save-status {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .save-ok { color: var(--green); }
    .save-err { color: var(--red); }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.55; cursor: default; }

    #refresh-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    #refresh-btn:hover:not(:disabled) { border-color: var(--accent); }

    #push-btn {
      background: var(--accent);
      color: #fff;
    }

    #push-btn:hover:not(:disabled) { opacity: 0.88; }

    #push-btn.btn-success {
      background: var(--green);
    }

    footer {
      max-width: 720px;
      margin: 2.5rem auto 0;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Psst</h1>
      <p>AI Coding Tool Usage Monitor</p>
    </div>
    <span id="last-updated"></span>
  </header>

  <main>
    <div id="status-section">
      <p class="empty-msg">Loading…</p>
    </div>

    <div class="actions">
      <button id="refresh-btn" onclick="location.reload()">Refresh</button>
      <button id="push-btn">Enable Push Notifications</button>
      <button id="settings-btn">Settings</button>
    </div>

    <div id="settings-panel" style="display:none"></div>
  </main>

  <footer>
    Psst &mdash; auto-refreshes every 60 s
  </footer>

  <script src="/app.js"></script>
</body>
</html>
